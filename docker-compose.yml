version: '3.8'

services:
  spreetail-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: spreetail
    ports:
      - "5432:5432"
    volumes:
      - spreetail-db-data:/var/lib/postgresql/data

volumes:
  spreetail-db-data:
