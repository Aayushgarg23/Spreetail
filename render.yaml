services:
  # ── Backend API ───────────────────────────────────────────────
  - type: web
    name: spreetail-api
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/app.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: spreetail-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: EXCHANGE_API_BASE
        value: "https://api.frankfurter.app"
      - key: FRONTEND_URL
        value: "https://spreetail.vercel.app"  # Update after deploying frontend

  # ── PostgreSQL Database ───────────────────────────────────────
  databases:
    - name: spreetail-db
      plan: free
      databaseName: spreetail
